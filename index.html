<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>과수원 직거래 장터</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
:root{
  --bg:#F4F0E1; --bgAlt:#ECE6D2; --ink:#22261D; --inkSoft:#5B5A47;
  --forest:#24402F; --forestDark:#182C20; --persimmon:#C1531B; --persimmonDark:#9C3F12;
  --gold:#C99A3D; --wood:#8B5E34; --line:#D8CFB0; --white:#FFFDF7; --alert:#D63B3B;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;-webkit-text-size-adjust:100%;overflow-x:hidden;}
h1,.display{font-family:'Gowun Batang',serif;}
.tabular{font-variant-numeric:tabular-nums;}
input,button,select,textarea{font-size:16px;font-family:inherit;}
button{touch-action:manipulation;cursor:pointer;}
input[type="date"],input[type="time"],select{min-height:44px;}

.header{background:var(--forest);color:#fff;padding:24px 16px 56px;position:relative;overflow:hidden;}
.header::before{content:"";position:absolute;inset:0;opacity:.08;background-image:repeating-linear-gradient(135deg,#fff 0 2px,transparent 2px 26px);}
.header-inner{max-width:720px;margin:0 auto;position:relative;}
.eyebrow{font-size:12px;letter-spacing:2px;color:var(--gold);margin-bottom:6px;}
.header h1{font-size:clamp(24px,7vw,32px);margin:0;font-weight:700;line-height:1.25;}
.header p{margin-top:8px;color:#D9E0D3;font-size:13.5px;line-height:1.6;}

.tabs-wrap{max-width:720px;margin:-30px auto 0;padding:0 16px;position:relative;z-index:2;}
.tabs{display:flex;gap:8px;justify-content:center;}
.tab-btn{flex:1 1 140px;max-width:200px;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;min-height:46px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--inkSoft);font-weight:600;font-size:14px;box-shadow:0 2px 6px -3px rgba(0,0,0,.15);}
.tab-btn.active{border-color:var(--forest);background:var(--forest);color:#fff;box-shadow:0 6px 14px -6px rgba(36,64,47,.5);}

main{max-width:720px;margin:0 auto;padding:32px 16px 60px;}

.section-label{font-size:12.5px;font-weight:700;color:var(--wood);letter-spacing:.5px;margin-bottom:8px;}
.field{margin-bottom:18px;}
.field-head{display:flex;justify-content:space-between;margin-bottom:6px;}
.field-label{font-size:13.5px;font-weight:600;}
.req{color:var(--persimmon);}
.hint{font-size:11.5px;color:var(--inkSoft);}
.err{font-size:11.5px;color:var(--persimmonDark);margin-top:4px;}
.input{width:100%;box-sizing:border-box;padding:12px 13px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--ink);outline:none;min-height:44px;}
select.input{background:var(--bg);}

.btn-primary{padding:13px 20px;border-radius:8px;border:none;background:var(--persimmon);color:#fff;font-weight:700;font-size:15px;min-height:46px;box-shadow:0 6px 14px -6px rgba(193,83,27,.55);width:100%;}
.btn-primary:disabled{opacity:.6;}
.btn-forest{padding:13px 20px;border-radius:8px;border:none;background:var(--forest);color:#fff;font-weight:700;font-size:15px;min-height:46px;width:100%;}
.btn-ghost{padding:10px 14px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--inkSoft);font-weight:600;font-size:13.5px;min-height:40px;}
.btn-ghost.danger{color:var(--persimmonDark);}

.divider{height:1px;background:var(--line);margin:18px 0;}

.landing{display:flex;flex-direction:column;gap:16px;max-width:420px;margin:10px auto 0;}
.landing-btn{display:flex;align-items:center;gap:14px;padding:20px 18px;border-radius:12px;border:1.5px solid var(--line);background:#fff;text-align:left;box-shadow:0 2px 0 rgba(34,38,29,.05),0 8px 16px -10px rgba(34,38,29,.25);}
.landing-btn .emoji{font-size:30px;}
.landing-btn .title{font-weight:700;font-size:16px;color:var(--forest);}
.landing-btn .desc{font-size:12.5px;color:var(--inkSoft);margin-top:3px;}

.fruit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
.fruit-card{cursor:pointer;border-radius:10px;padding:14px 12px;border:1.5px solid var(--line);background:#fff;text-align:center;}
.fruit-card.active{border-color:var(--persimmon);background:#FBEAE0;}
.fruit-card .name{font-weight:700;font-size:15px;color:var(--forest);margin-bottom:4px;}
.fruit-card .price{font-size:13px;color:var(--inkSoft);}
.fruit-card .stock{font-size:11px;color:var(--gold);margin-top:3px;}
.fruit-thumb{width:100%;aspect-ratio:1/1;border-radius:8px;overflow:hidden;margin-bottom:8px;background:var(--bgAlt);display:flex;align-items:center;justify-content:center;}
.fruit-thumb img{width:100%;height:100%;object-fit:cover;}
.fruit-thumb.placeholder{font-size:34px;}
.fruit-thumb-admin{width:56px;height:56px;border-radius:8px;overflow:hidden;background:var(--bgAlt);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:24px;}
.fruit-thumb-admin img{width:100%;height:100%;object-fit:cover;}

.qty-row{display:flex;flex-wrap:wrap;align-items:center;gap:12px;}
.stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.stepper button{width:44px;height:44px;border:none;background:var(--bg);font-size:18px;color:var(--forest);}
.stepper input{width:56px;text-align:center;border:none;outline:none;font-size:16px;padding:9px 0;background:#fff;}
.qty-amount{font-weight:700;color:var(--persimmonDark);font-size:16px;}

.delivery-opts{display:flex;flex-wrap:wrap;gap:10px;}
.delivery-opt{flex:1 1 100px;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px 8px;border-radius:9px;border:1.5px solid var(--line);background:#fff;color:var(--inkSoft);font-weight:700;font-size:13.5px;}
.delivery-opt.active{border-color:var(--forest);background:var(--forest);color:#fff;}
.shipping-note{margin-top:10px;font-size:12.5px;color:var(--inkSoft);background:var(--bgAlt);border-radius:8px;padding:8px 12px;}

.gift-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:var(--inkSoft);padding:6px 0;min-height:32px;margin-bottom:18px;}
.gift-toggle input{width:20px;height:20px;flex-shrink:0;}

.box-panel{display:flex;flex-direction:column;gap:14px;background:var(--bgAlt);border-radius:10px;padding:14px;margin-bottom:18px;}
.box-panel .field{margin-bottom:0;}
.two-col{display:flex;flex-wrap:wrap;gap:10px;}
.two-col>div{flex:1 1 130px;}

.cart-item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.cart-item-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
.cart-item .badge{display:inline-block;font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px;background:var(--bgAlt);color:var(--forest);margin-top:4px;}

.summary-box{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13.5px;display:flex;flex-direction:column;gap:6px;}
.summary-row{display:flex;justify-content:space-between;}
.summary-total{font-weight:700;color:var(--persimmonDark);font-size:15px;}

.account-box{background:var(--forestDark);color:#fff;border-radius:10px;padding:14px 16px;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px;}
.account-box .meta{font-size:12px;color:#B9C6BB;margin-bottom:3px;word-break:break-word;}
.account-box .num{font-size:17px;font-weight:700;letter-spacing:.5px;word-break:break-word;}
.copy-btn{flex-shrink:0;background:rgba(255,255,255,.12);border:none;border-radius:8px;padding:10px 12px;min-height:40px;color:#fff;font-size:12.5px;}

.crate{position:relative;box-sizing:border-box;background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px 18px 16px;box-shadow:0 2px 0 rgba(34,38,29,.05),0 8px 16px -10px rgba(34,38,29,.25);}
.crate::before{content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:18px;height:18px;border-radius:50%;background:var(--bg);border:2px solid var(--wood);}

.empty-note{font-size:13.5px;color:var(--inkSoft);text-align:center;padding:30px 0;}

.mini-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;}
.mini-tab{padding:9px 14px;min-height:40px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--inkSoft);font-size:13px;font-weight:600;}
.mini-tab.active{border-color:var(--forest);background:var(--forest);color:#fff;}
.count-alert{color:var(--alert);font-weight:800;}
.mini-tab.active .count-alert{color:#FFB4A8;}

.admin-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:20px;}
.add-fruit-row{display:flex;flex-wrap:wrap;gap:8px;}
.add-fruit-row input{flex:2 1 160px;}
.add-fruit-row input.num{flex:1 1 110px;}

.fruit-row{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.fruit-row.inactive{opacity:.55;}
.fruit-row-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.fruit-row-top .name{font-weight:700;color:var(--forest);font-size:15px;}
.fruit-row-sub{font-size:12.5px;color:var(--inkSoft);margin-top:2px;}
.fruit-row-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}

.avail-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.avail-row .d{font-weight:700;color:var(--forest);}

.order-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;}
.order-card.modified{border-color:var(--alert);}
.order-card-top{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:8px;}
.order-card .meta{font-size:12.5px;color:var(--inkSoft);margin-top:8px;line-height:1.7;}
.order-item-line{font-size:12.5px;color:var(--ink);padding:6px 0;border-top:1px dashed var(--line);}
.modified-badge{display:inline-block;background:var(--alert);color:#fff;font-size:10.5px;font-weight:700;border-radius:999px;padding:2px 8px;margin-left:6px;vertical-align:middle;}

.my-order-item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;}
.my-order-item .top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}

.modal-overlay{position:fixed;inset:0;background:rgba(24,38,29,.55);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;}
.modal{background:var(--white);border-radius:14px;padding:20px;max-width:420px;width:100%;max-height:90vh;overflow:auto;}

.setup-warning{background:#FBEAE0;border:1px solid var(--persimmon);color:var(--persimmonDark);padding:14px 16px;border-radius:10px;margin-bottom:20px;font-size:13px;line-height:1.7;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>

<script>
/* =========================================================
   설정 — APPS_SCRIPT_URL만 본인 것으로 바꿔주세요
   ========================================================= */
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxauSK9oRKfs3F-jdOTo6R36FKBw6fym7gX-guxb5z6Awy6lVx7LXVpvahuZhgsdHtI3A/exec",
  ADMIN_PIN: "1004",
  FARM_ADDRESS: "경기도 안성시 삼죽면 하냉길 33-58",
  SHIPPING_FEE: 4000,
  FREE_SHIPPING_BOX_COUNT: 2,
  POLL_MS: 15000,
};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const won = (n) => (Number(n) || 0).toLocaleString() + "원";
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const digits = (s) => String(s || "").replace(/\D/g, "");
// 전화번호 비교용 정규화: 맨앞 0이 있든 없든 동일하게 취급
// (예전에 숫자로 저장돼 앞 0이 사라진 데이터도 매칭되도록)
const phoneKey = (s) => { let d = digits(s); return d.replace(/^0+/, ""); };
const methodLabel = (m) => m === "pickup" ? "🚗 농장 방문 수령/픽업" : m === "church" ? "🎁 직접 전달/맞춤 배달" : "🚚 택배 배송";

// 장바구니에 담기 전 "지금 담는 항목" 편집 폼
const EMPTY_ITEM = () => ({
  fruitId: "", qty: 1,
  deliveryMethod: "delivery",
  address: "",
  visitDate: "", visitTime: "", visitPhone: "",
  churchDate: "",
  isGift: false, receiverName: "", receiverPhone: "", giftArrivalDate: "",
  errors: {},
});

let STATE = {
  view: "order",
  orderStep: "landing", // landing → identify → editList → build(담기+장바구니) → done
  identifyMode: "new",
  identify: { name: "", phone: "", error: "" },
  buyer: { name: "", phone: "" },
  cart: [],
  item: EMPTY_ITEM(),
  editingItemId: null,     // 장바구니 안에서 특정 항목 수정 중
  myOrders: [],
  editingOrderId: null,    // 기존 제출 주문을 통째로 다시 편집 중
  editingCreatedAt: null,
  submitting: false,
  doneMode: "new",
  copied: false,
  adminUnlocked: false,
  pinInput: "",
  pinError: false,
  fruits: [],
  orders: [],
  account: { bank: "", number: "", holder: "", phone: "" },
  businessName: "",
  availability: [], // [{id, date, start, end}]
  loaded: false,
  loadError: "",
  saveError: "",
  adminTab: "orders",
  workSub: "delivery",
  fruitForm: { name: "", price: "", stock: "", image: "" },
  accountForm: null,
  availForm: { date: "", start: "09:00", end: "18:00" },
  editFruit: null, // 과일 수정 모달 대상
  editOrderItem: null, // 관리자 주문 품목 수정 모달 {orderId, itemId, ...필드}
};

function setState(patch){ STATE = { ...STATE, ...patch }; render(); }
function setStateSilent(patch){ STATE = { ...STATE, ...patch }; }
function setItem(patch){ STATE.item = { ...STATE.item, ...patch }; render(); }

/* ---------------- API ---------------- */
async function apiGet(){
  const res = await fetch(CONFIG.APPS_SCRIPT_URL + "?action=getAll&t=" + Date.now());
  if(!res.ok) throw new Error("network");
  return res.json();
}
async function apiPost(body){
  const res = await fetch(CONFIG.APPS_SCRIPT_URL, { method:"POST", body: JSON.stringify(body) });
  if(!res.ok) throw new Error("network");
  return res.json();
}
async function loadAll(silent){
  if(CONFIG.APPS_SCRIPT_URL.indexOf("PASTE_YOUR")===0 || !CONFIG.APPS_SCRIPT_URL){
    setState({ loaded:true, loadError:"SETUP_NEEDED" }); return;
  }
  try{
    const data = await apiGet();
    const orders = (data.orders||[]).map(o=>{
      const items=(o.items||[]).map((it,idx)=>({ ...it, itemId: it.itemId || (o.id+"-"+idx) }));
      return { ...o, items, cancelRequested: o.cancelRequested===true||o.cancelRequested==="TRUE" };
    });
    const patch = {
      fruits: data.fruits||[], orders,
      account: data.account||STATE.account,
      businessName: data.businessName!==undefined?data.businessName:STATE.businessName,
      availability: data.availability||[],
      loaded:true, loadError:"",
    };
    const typing = document.activeElement && /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);
    if(silent && typing) setStateSilent(patch); else setState(patch);
  }catch(e){
    if(!silent) setState({ loaded:true, loadError:"데이터를 불러오지 못했어요. 잠시 후 다시 시도해주세요." });
  }
}

loadAll();
setInterval(()=>{ if(STATE.view==="order") loadAll(true); }, CONFIG.POLL_MS);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible" && STATE.view==="order") loadAll(true); });

/* ---------------- helpers ---------------- */
function fruitById(id){ return STATE.fruits.find(f=>f.id===id); }
function itemAmount(it){ const f=fruitById(it.fruitId); return f? f.price*it.qty : 0; }
function itemShipping(it){ return it.deliveryMethod==="delivery" ? (it.qty>=CONFIG.FREE_SHIPPING_BOX_COUNT?0:CONFIG.SHIPPING_FEE) : 0; }
function itemTotal(it){ return itemAmount(it)+itemShipping(it); }
function cartTotal(){ return STATE.cart.reduce((s,it)=>s+itemTotal(it),0); }
// 특정 날짜의 상주 시간대 목록
function windowsForDate(date){ return STATE.availability.filter(a=>a.date===date); }
function availableDates(){ return [...new Set(STATE.availability.map(a=>a.date))].sort(); }
// 30분 간격 시간 옵션 생성 (start~end)
function timeSlots(date){
  const wins = windowsForDate(date);
  const slots = [];
  wins.forEach(w=>{
    const [sh,sm]=w.start.split(":").map(Number);
    const [eh,em]=w.end.split(":").map(Number);
    let t=sh*60+sm; const end=eh*60+em;
    while(t<=end){ const hh=String(Math.floor(t/60)).padStart(2,"0"); const mm=String(t%60).padStart(2,"0"); slots.push(hh+":"+mm); t+=30; }
  });
  return [...new Set(slots)].sort();
}

/* ---------------- Render root ---------------- */
function render(){
  const app = document.getElementById("app");
  if(!STATE.loaded){ app.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;"><div class="display" style="color:var(--forest);font-size:18px;">과수원 문을 여는 중…</div></div>`; return; }
  if(STATE.loadError==="SETUP_NEEDED"){
    app.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;"><div class="crate" style="max-width:420px;"><div class="display" style="font-size:20px;color:var(--forest);margin-bottom:10px;">설정이 필요해요</div><div style="font-size:13.5px;line-height:1.8;color:var(--inkSoft);">index.html 맨 위 <code>CONFIG.APPS_SCRIPT_URL</code> 값을 구글 Apps Script 웹 앱 URL로 바꿔주세요. 설치 가이드를 참고해주세요.</div></div></div>`;
    return;
  }
  app.innerHTML = `
    <div class="header"><div class="header-inner">
      <div class="eyebrow">${STATE.businessName?esc(STATE.businessName):"ORCHARD DIRECT"}</div>
      <h1>과수원 직거래 장터</h1>
      <p>나무에서 바로 딴 과일을, 믿을 수 있는 분께 직접 보내드립니다.</p>
    </div></div>
    <div class="tabs-wrap"><div class="tabs">
      <button class="tab-btn ${STATE.view==="order"?"active":""}" data-action="setView" data-v="order">🧺 주문하기</button>
      <button class="tab-btn ${STATE.view==="admin"?"active":""}" data-action="setView" data-v="admin">📋 농장 관리</button>
    </div></div>
    <main>
      ${STATE.loadError && STATE.loadError!=="SETUP_NEEDED"?`<div class="setup-warning">${esc(STATE.loadError)}</div>`:""}
      ${STATE.saveError?`<div class="setup-warning">${esc(STATE.saveError)}</div>`:""}
      ${STATE.view==="order"?renderOrderArea():renderAdminArea()}
    </main>`;
  renderModal();
  bindEvents();
}

/* ---------------- Order area ---------------- */
function renderOrderArea(){
  if(STATE.orderStep==="landing") return renderLanding();
  if(STATE.orderStep==="identify") return renderIdentify();
  if(STATE.orderStep==="editList") return renderEditList();
  if(STATE.orderStep==="done") return renderDone();
  return renderBuild();
}

function renderLanding(){
  return `<div class="landing">
    <button class="landing-btn" data-action="startNew"><span class="emoji">🧺</span><span><span class="title">새 주문</span><br/><span class="desc">새로 주문하시는 분은 여기를 눌러주세요</span></span></button>
    <button class="landing-btn" data-action="startEdit"><span class="emoji">✏️</span><span><span class="title">주문 변경</span><br/><span class="desc">이미 넣은 주문을 확인하거나 수정해요</span></span></button>
  </div>`;
}

function renderIdentify(){
  const idn=STATE.identify; const isNew=STATE.identifyMode==="new";
  return `<div style="display:flex;justify-content:center;padding:6px 0 30px;">
    <div class="crate" style="width:100%;max-width:360px;">
      <div class="display" style="font-size:18px;color:var(--forest);margin-bottom:4px;">${isNew?"주문자 정보":"내 주문 찾기"}</div>
      <div style="font-size:12.5px;color:var(--inkSoft);margin-bottom:16px;">${isNew?"성함과 연락처를 입력해주세요.":"주문하실 때 입력한 성함과 연락처를 입력해주세요."}</div>

      <div class="field"><div class="field-head"><label class="field-label">연락처 <span class="req">*</span></label></div><input class="input" type="tel" inputmode="tel" data-bind="idPhone" placeholder="010-0000-0000" value="${esc(idn.phone)}" /></div>
      ${idn.error?`<div class="err" style="margin-bottom:10px;">${esc(idn.error)}</div>`:""}

}

function renderEditList(){
  const list=STATE.myOrders;
  return `<div style="max-width:480px;margin:0 auto;">
    <div class="section-label">내 주문 내역 (${list.length}건)</div>
    ${list.map(o=>{
      const t = (o.items||[]).reduce((s,it)=>s+(it.totalAmount??0),0);
      const kinds = [...new Set((o.items||[]).map(it=>methodLabel(it.deliveryMethod)))].join(", ");
      return `<div class="my-order-item">
        <div class="top">
          <div>
            <div style="font-weight:700;color:var(--forest);">${(o.items||[]).length}개 품목 ${o.modified?`<span class="modified-badge">수정됨</span>`:""}${o.cancelRequested?`<span class="modified-badge">취소 요청됨</span>`:""}</div>
            <div style="font-size:12px;color:var(--inkSoft);margin-top:3px;">${esc(kinds)} · ${new Date(o.createdAt).toLocaleDateString("ko-KR")}</div>
          </div>
          <div class="tabular" style="font-weight:700;color:var(--persimmonDark);">${won(t)}</div>
        </div>
        ${o.cancelRequested
          ? `<div style="margin-top:10px;font-size:12.5px;color:var(--persimmonDark);background:#FBEAE0;border-radius:8px;padding:8px 12px;">취소 요청이 접수됐어요. 농장에서 확인 후 처리해드립니다.</div>`
          : `<div style="display:flex;gap:8px;margin-top:10px;">
              <button class="btn-ghost" style="flex:1;" data-action="editOrder" data-id="${esc(o.id)}">주문 수정</button>

}

function renderDone(){
  const edited = STATE.doneMode==="edit";
  return `<div style="display:flex;justify-content:center;padding:10px 0 40px;">
    <div class="crate" style="width:100%;max-width:440px;text-align:center;">
      <div style="font-size:34px;margin-bottom:4px;">🧺</div>
      <div class="display" style="font-size:20px;color:var(--forest);margin-bottom:6px;">${edited?"주문이 수정됐어요":"주문이 접수됐어요"}</div>
      <div style="font-size:13.5px;color:var(--inkSoft);line-height:1.7;margin-bottom:16px;">아래 계좌로 총 <span class="tabular" style="font-weight:700;color:var(--persimmonDark);">${won(STATE._doneTotal||0)}</span> 입금해주시면 준비해서 보내드릴게요.</div>

      <button class="btn-ghost" style="width:100%;margin-top:16px;" data-action="backToLanding">처음으로</button>

/* ---- build step: 과일 담기 + 장바구니 ---- */
function renderBuild(){
  const activeFruits = STATE.fruits.filter(f=>f.active);
  if(!activeFruits.length){
    return `<div style="text-align:center;padding:40px 0;color:var(--inkSoft);"><div class="display" style="font-size:20px;color:var(--forest);margin-bottom:8px;">지금은 주문 가능한 과일이 없어요</div><div style="font-size:13.5px;">수확 소식이 올라오면 다시 찾아주세요.</div></div>`;
  }
  const it=STATE.item; const e=it.errors||{};
  if(!it.fruitId) it.fruitId = activeFruits[0].id;
  const editingCartItem = !!STATE.editingItemId;
  const amount=itemAmount(it), shipping=itemShipping(it);
  const dates = availableDates();

  return `
    <div style="font-size:12.5px;color:var(--inkSoft);margin-bottom:16px;">${esc(STATE.buyer.name)}님 (${esc(STATE.buyer.phone)}) ${STATE.editingOrderId?"· 기존 주문 수정 중":""}</div>

    ${STATE.cart.length?`
      <div class="section-label">장바구니 (${STATE.cart.length})</div>
      ${STATE.cart.map(ci=>{
        const f=fruitById(ci.fruitId);
        return `<div class="cart-item">
          <div class="cart-item-top">
            <div style="min-width:0;">
              <div style="font-weight:700;color:var(--forest);">${esc(f?f.name:"?")} × ${ci.qty}</div>
              <div class="badge">${methodLabel(ci.deliveryMethod)}${ci.isGift?" · 🎁 선물":""}</div>
            </div>
            <div class="tabular" style="font-weight:700;color:var(--persimmonDark);white-space:nowrap;">${won(itemTotal(ci))}</div>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn-ghost" style="font-size:12px;padding:6px 10px;" data-action="editCartItem" data-id="${esc(ci._id)}">수정</button>
            <button class="btn-ghost danger" style="font-size:12px;padding:6px 10px;" data-action="removeCartItem" data-id="${esc(ci._id)}">빼기</button>
          </div>
        </div>`;
      }).join("")}
      <div class="divider"></div>
    `:""}

    <div class="section-label">${editingCartItem?"항목 수정":"과일 담기"}</div>
    <div class="fruit-grid">
      ${activeFruits.map(fr=>`<div class="fruit-card ${fr.id===it.fruitId?"active":""}" data-action="pickFruit" data-id="${esc(fr.id)}">
        ${fr.image?`<div class="fruit-thumb"><img src="${esc(fr.image)}" alt="${esc(fr.name)}" loading="lazy"/></div>`:`<div class="fruit-thumb placeholder">🍎</div>`}
        <div class="name">${esc(fr.name)}</div>
        <div class="price tabular">${won(fr.price)}</div>
        ${typeof fr.stock==="number"?`<div class="stock">재고 ${fr.stock}</div>`:""}
      </div>`).join("")}
    </div>
    ${e.fruitId?`<div class="err">${e.fruitId}</div>`:""}

    <div class="field" style="margin-top:18px;">
      <div class="field-head"><label class="field-label">수량 <span class="req">*</span></label></div>
      <div class="qty-row">
        <div class="stepper"><button data-action="itemQtyMinus">−</button><input class="tabular" data-bind="itemQty" type="number" min="1" value="${it.qty}" /><button data-action="itemQtyPlus">＋</button></div>
        <div class="qty-amount tabular">${won(amount)}</div>
      </div>
    </div>

    <div class="field">
      <div class="section-label">수령 방법</div>
      <div class="delivery-opts">
        <button class="delivery-opt ${it.deliveryMethod==="delivery"?"active":""}" data-action="itemDelivery" data-v="delivery">🚚 택배 배송</button>
        <button class="delivery-opt ${it.deliveryMethod==="pickup"?"active":""}" data-action="itemDelivery" data-v="pickup">🚗 방문 수령/픽업</button>
        <button class="delivery-opt ${it.deliveryMethod==="church"?"active":""}" data-action="itemDelivery" data-v="church">🎁 직접 전달/맞춤 배달</button>
      </div>
      ${it.deliveryMethod==="delivery"?`<div class="shipping-note">택배비: 1박스 ${won(CONFIG.SHIPPING_FEE)} · ${CONFIG.FREE_SHIPPING_BOX_COUNT}박스 이상 무료 — 이 품목 <strong style="color:${shipping===0?"var(--forest)":"var(--persimmonDark)"};">${shipping===0?"무료 배송":won(shipping)}</strong></div>`:""}
    </div>

    ${it.deliveryMethod==="delivery"?`
      <div class="field"><div class="field-head"><label class="field-label">주소</label><span class="hint">선택사항</span></div><input class="input" data-bind="itemAddress" placeholder="배송받으실 주소" value="${esc(it.address)}" /></div>
      <div class="field"><div class="field-head"><label class="field-label">받으실 날짜</label><span class="hint">선택사항</span></div><input class="input" type="date" data-bind="itemGiftArrival" value="${esc(it.giftArrivalDate)}" /></div>`:""}

    ${it.deliveryMethod==="pickup"?renderVisitFields(it,e,dates):""}

    ${it.deliveryMethod==="church"?`
      <div class="box-panel">
        <div style="font-size:13px;color:var(--forest);font-weight:700;">🎁 농장에서 원하시는 곳으로 직접 전달해드려요.</div>
        <div class="field"><div class="field-head"><label class="field-label">받으실 곳 <span class="req">*</span></label></div><input class="input" data-bind="itemAddress" placeholder="예: ○○교회 본당 앞, △△아파트 경비실" value="${esc(it.address)}" />${e.address?`<div class="err">${e.address}</div>`:""}</div>
        <div class="field"><div class="field-head"><label class="field-label">수령 날짜 <span class="req">*</span></label></div><input class="input" type="date" data-bind="itemChurchDate" value="${esc(it.churchDate)}" />${e.churchDate?`<div class="err">${e.churchDate}</div>`:""}</div>
      </div>`:""}

    <label class="gift-toggle"><input type="checkbox" data-bind="itemIsGift" ${it.isGift?"checked":""}/> 🎁 선물이에요 (받는 분이 따로 있어요)</label>
    ${it.isGift?`
      <div class="box-panel">
        <div class="field"><div class="field-head"><label class="field-label">수령자 성함 <span class="req">*</span></label></div><input class="input" data-bind="itemReceiverName" placeholder="선물 받으실 분" value="${esc(it.receiverName)}" />${e.receiverName?`<div class="err">${e.receiverName}</div>`:""}</div>
        <div class="field"><div class="field-head"><label class="field-label">수령자 연락처</label><span class="hint">선택사항</span></div><input class="input" type="tel" inputmode="tel" data-bind="itemReceiverPhone" placeholder="010-0000-0000" value="${esc(it.receiverPhone)}" /></div>
      </div>`:""}

    <button class="btn-forest" data-action="addToCart">${editingCartItem?"항목 저장":"＋ 장바구니에 담기"}</button>
    ${editingCartItem?`<button class="btn-ghost" style="width:100%;margin-top:10px;" data-action="cancelCartEdit">담기 취소</button>`:""}

    ${STATE.cart.length?`
      <div class="divider"></div>
      <div class="section-label">결제 금액</div>
      <div class="summary-box">
        ${STATE.cart.map(ci=>{const f=fruitById(ci.fruitId);return `<div class="summary-row"><span>${esc(f?f.name:"?")} × ${ci.qty} (${methodLabel(ci.deliveryMethod).replace(/^[^ ]+ /,"")})</span><span class="tabular">${won(itemTotal(ci))}</span></div>`;}).join("")}
        <div style="height:1px;background:var(--line);margin:2px 0;"></div>
        <div class="summary-row summary-total"><span>합계</span><span class="tabular">${won(cartTotal())}</span></div>
      </div>
      <div class="field" style="margin-top:16px;"><div class="section-label">입금 계좌</div>${renderAccountBox()}</div>
      <button class="btn-primary" data-action="submitOrder" ${STATE.submitting?"disabled":""}>${STATE.submitting?`<span class="spinner"></span> ${STATE.editingOrderId?"저장 중…":"접수 중…"}`:`${STATE.editingOrderId?"수정 내용 저장":"주문 완료하기"} (${won(cartTotal())})`}</button>
      ${STATE.editingOrderId?`<button class="btn-ghost" style="width:100%;margin-top:10px;" data-action="cancelOrderEdit">수정 취소</button>`:""}
    `:`<div class="empty-note">과일을 담으면 여기에 장바구니와 결제 정보가 나타나요.</div>`}
  `;
}

function renderVisitFields(it,e,dates){
  // 상주 일정이 등록돼 있으면 그 날짜/시간만 선택지로 제공
  const hasWindows = dates.length>0;
  const slots = it.visitDate? timeSlots(it.visitDate):[];
  return `<div class="box-panel">
    <div style="font-size:13px;color:var(--forest);font-weight:700;">📍 과수원 주소: ${esc(CONFIG.FARM_ADDRESS)}</div>
    ${hasWindows?`
      <div class="field"><div class="field-head"><label class="field-label">방문 날짜 <span class="req">*</span></label><span class="hint">농장주 상주일만 선택 가능</span></div>
        <select class="input" data-bind="itemVisitDate">
          <option value="">날짜 선택</option>
          ${dates.map(d=>`<option value="${d}" ${it.visitDate===d?"selected":""}>${d} (${windowsForDate(d).map(w=>w.start+"~"+w.end).join(", ")})</option>`).join("")}
        </select>${e.visitDate?`<div class="err">${e.visitDate}</div>`:""}</div>
      <div class="field"><div class="field-head"><label class="field-label">방문 시간 <span class="req">*</span></label></div>
        <select class="input" data-bind="itemVisitTime" ${!it.visitDate?"disabled":""}>
          <option value="">${it.visitDate?"시간 선택":"날짜를 먼저 선택하세요"}</option>
          ${slots.map(s=>`<option value="${s}" ${it.visitTime===s?"selected":""}>${s}</option>`).join("")}
        </select>${e.visitTime?`<div class="err">${e.visitTime}</div>`:""}</div>
    `:`
      <div style="font-size:12.5px;color:var(--persimmonDark);">아직 농장주 상주 일정이 등록되지 않았어요. 관리자에게 방문 가능 일정을 문의해주세요.</div>
      <div class="two-col">
        <div class="field"><div class="field-head"><label class="field-label">방문 날짜 <span class="req">*</span></label></div><input class="input" type="date" data-bind="itemVisitDate" value="${esc(it.visitDate)}" />${e.visitDate?`<div class="err">${e.visitDate}</div>`:""}</div>
        <div class="field"><div class="field-head"><label class="field-label">방문 시간 <span class="req">*</span></label></div><input class="input" type="time" data-bind="itemVisitTime" value="${esc(it.visitTime)}" />${e.visitTime?`<div class="err">${e.visitTime}</div>`:""}</div>
      </div>
    `}
    <div class="field"><div class="field-head"><label class="field-label">방문자 연락처 <span class="req">*</span></label><span class="hint">실제 방문하실 분 번호</span></div><input class="input" type="tel" inputmode="tel" data-bind="itemVisitPhone" placeholder="010-0000-0000" value="${esc(it.visitPhone)}" />${e.visitPhone?`<div class="err">${e.visitPhone}</div>`:""}</div>
  </div>`;
}

function renderAccountBox(){
  const a=STATE.account;
  if(!a||!a.number) return `<div style="font-size:13px;color:var(--inkSoft);">아직 계좌 정보가 등록되지 않았어요. 농장 관리자에게 문의해주세요.</div>`;
  return `<div class="account-box">
    <div style="min-width:0;"><div class="meta">${esc(a.bank)} · ${esc(a.holder)}${a.phone?" · "+esc(a.phone):""}</div><div class="num tabular">${esc(a.number)}</div></div>
    <button class="copy-btn" data-action="copyAccount">${STATE.copied?"✓ 복사됨":"📋 복사"}</button>
  </div>`;
}

/* ---------------- Admin ---------------- */
function renderAdminArea(){
  if(!STATE.adminUnlocked) return renderPinGate();
  const modCount = STATE.orders.filter(o=>o.modified).length;
  const countHtml = modCount>0 ? `주문 확인 (<span class="count-alert">${STATE.orders.length}</span>)` : `주문 확인 (${STATE.orders.length})`;
  return `<div class="mini-tabs">
    <button class="mini-tab ${STATE.adminTab==="orders"?"active":""}" data-action="setAdminTab" data-v="orders">${countHtml}</button>
    <button class="mini-tab ${STATE.adminTab==="work"?"active":""}" data-action="setAdminTab" data-v="work">작업 목록</button>

    <button class="mini-tab ${STATE.adminTab==="avail"?"active":""}" data-action="setAdminTab" data-v="avail">상주 일정</button>
    <button class="mini-tab ${STATE.adminTab==="account"?"active":""}" data-action="setAdminTab" data-v="account">가게 설정</button>
  </div>
  ${STATE.adminTab==="orders"?renderOrderManager():""}
  ${STATE.adminTab==="work"?renderWorkList():""}

  ${STATE.adminTab==="avail"?renderAvailManager():""}

}

      <div class="display" style="font-size:18px;margin-bottom:4px;">관리자 확인</div>
      <div style="font-size:12.5px;color:var(--inkSoft);margin-bottom:14px;">농장 관리 화면은 관리자만 볼 수 있어요.</div>
      <input class="input" id="pinInput" type="password" inputmode="numeric" placeholder="PIN 번호" style="text-align:center;letter-spacing:4px;" value="${esc(STATE.pinInput)}" />

      <label class="btn-ghost" style="margin:0;">${ff.image?"사진 변경":"📷 사진 선택"}<input type="file" accept="image/*" data-imgfor="new" style="display:none;" /></label>

function renderAvailManager(){

  return `<div class="admin-card">
    <div class="section-label">농장주 상주 일정 추가</div>

/* ---- 작업 목록 (수령방법 기준) ---- */
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function ym(dateStr){ return (dateStr||"").slice(0,7); }
function curYM(){ return todayStr().slice(0,7); }
// 택배 예정일: 선물 희망일 있으면 그것, 없으면 주문 생성일(YYYY-MM-DD)
function deliveryDate(o,it){ return it.giftArrivalDate || (o.createdAt? o.createdAt.slice(0,10):""); }
// 모든 주문의 품목을 수령방법별로 평탄화. 각 원소에 주문정보(o) + 품목(it) + itemId 포함
function flattenItems(method){
  const rows=[];
  STATE.orders.forEach(o=>{
    if(o.cancelRequested) return; // 취소 요청된 주문은 작업 목록/집계에서 제외
    (o.items||[]).forEach(it=>{
      if(it.deliveryMethod!==method) return;
      rows.push({ o, it, itemId: it.itemId });
    });
  });
  return rows;
}
function schedDate(method,o,it){
  if(method==="delivery") return deliveryDate(o,it);
  if(method==="pickup") return it.visitDate||"";
  if(method==="church") return it.churchDate||"";
  return "";
}

  ${sub==="delivery"?renderWorkDelivery():sub==="pickup"?renderWorkDated("pickup"):renderWorkDated("church")}`;
}

function statBar(cells){
  return `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
    ${cells.map(c=>`<div style="flex:1 1 100px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;text-align:center;">
      <div style="font-size:11px;color:var(--inkSoft);margin-bottom:3px;">${c.label}</div>
      <div style="font-weight:800;color:${c.color||"var(--forest)"};font-size:15px;" class="tabular">${c.n}건</div>
      <div style="font-size:11px;color:var(--inkSoft);line-height:1.5;">${c.breakdown||"—"}</div>
    </div>`).join("")}
  </div>`;
}
function sumQ(rows){ return rows.reduce((s,r)=>s+(r.it.qty||0),0); }
// 과일 종류별 개수 문자열: "황도 3 · 사과 5"
function breakdownQ(rows){
  const map={};
  rows.forEach(r=>{ const n=r.it.fruitName||"?"; map[n]=(map[n]||0)+(r.it.qty||0); });
  const keys=Object.keys(map);
  if(!keys.length) return "—";
  return keys.map(n=>`${esc(n)} ${map[n]}`).join(" · ");
}

function renderWorkDelivery(){
  const all=flattenItems("delivery"); // 취소된 주문은 STATE.orders에 이미 없음
  // 집계
  const total=all;
  const month=all.filter(r=>ym(deliveryDate(r.o,r.it))===curYM());
  const undone=all.filter(r=>!r.it.delivered);
  // 목록: 미배송만, 예정일 오름차순
  const list=[...undone].sort((a,b)=>deliveryDate(a.o,a.it).localeCompare(deliveryDate(b.o,b.it)));
  const bar=statBar([
    {label:"미배송량",n:undone.length,breakdown:breakdownQ(undone),color:"var(--persimmonDark)"},
    {label:"금월 주문량",n:month.length,breakdown:breakdownQ(month)},
    {label:"총 주문량",n:total.length,breakdown:breakdownQ(total)},
  ]);
  if(!list.length) return bar+`<div class="empty-note">미배송 택배가 없어요. 🎉</div>`;
  return bar+list.map(r=>{
    const it=r.it,o=r.o; const d=deliveryDate(o,it);
    const recv = it.isGift? `${esc(it.receiverName||"")}${it.receiverPhone?"("+esc(it.receiverPhone)+")":""}` : esc(o.name);
    return `<div class="order-card">

        <div style="min-width:0;">
          <div style="font-weight:700;color:var(--forest);font-size:15px;">${esc(it.fruitName)} × ${it.qty} ${it.isGift?`<span style="font-size:11px;color:var(--gold);">🎁 선물</span>`:""}</div>
          <div style="font-size:12.5px;color:var(--inkSoft);margin-top:3px;">받는분: ${recv}</div>

      <button class="btn-forest" style="margin-top:10px;font-size:12.5px;padding:8px 12px;min-height:36px;width:auto;" data-action="markItemDone" data-oid="${esc(o.id)}" data-iid="${esc(it.itemId)}" data-field="delivered">✅ 배송완료</button>
    </div>`;
  }).join("");

function renderWorkDated(method){
  const all=flattenItems(method);
  const today=todayStr();
  const total=all;
  const month=all.filter(r=>ym(schedDate(method,r.o,r.it))===curYM());
  // 준비필요: 아직 prepared 아니고 날짜 안 지남
  const needPrep=all.filter(r=>!r.it.prepared && schedDate(method,r.o,r.it)>=today);
  // 목록: 날짜 안 지난 것만(당일 포함), 날짜 오름차순 (방문은 시간 2차)
  let list=all.filter(r=>schedDate(method,r.o,r.it)>=today);
  list.sort((a,b)=>{
    const da=schedDate(method,a.o,a.it), db=schedDate(method,b.o,b.it);
    if(da!==db) return da.localeCompare(db);
    if(method==="pickup") return (a.it.visitTime||"").localeCompare(b.it.visitTime||"");
    return 0;
  });
  const bar=statBar([
    {label:"준비필요량",n:needPrep.length,breakdown:breakdownQ(needPrep),color:"var(--persimmonDark)"},
    {label:"금월 주문량",n:month.length,breakdown:breakdownQ(month)},
    {label:"총 주문량",n:total.length,breakdown:breakdownQ(total)},
  ]);
  if(!list.length) return bar+`<div class="empty-note">예정된 ${method==="pickup"?"방문/픽업":"직접 전달"}이 없어요.</div>`;
  return bar+list.map(r=>{
    const it=r.it,o=r.o; const d=schedDate(method,o,it);
    const when = method==="pickup"? `${d} ${esc(it.visitTime||"")}` : d;
    const contact = method==="pickup"? `방문자 ☎ ${esc(it.visitPhone||o.phone)}` : `주문자 ${esc(o.name)} · ☎ ${esc(o.phone)}`;
    const place = method==="church" && it.address ? `<div style="font-size:12.5px;color:var(--forest);margin-top:3px;">📍 받으실 곳: ${esc(it.address)}</div>` : "";
    return `<div class="order-card" style="${it.prepared?"opacity:.6;":""}">
      <div class="order-card-top">
        <div style="min-width:0;">
          <div style="font-weight:700;color:var(--forest);font-size:15px;">${esc(it.fruitName)} × ${it.qty} ${it.isGift?`<span style="font-size:11px;color:var(--gold);">🎁</span>`:""}</div>
          <div style="font-size:12.5px;color:var(--inkSoft);margin-top:3px;">${contact}</div>
          ${place}
        </div>
        <div style="text-align:right;font-size:12px;color:var(--persimmonDark);font-weight:700;">${esc(when)}</div>
      </div>
      <button class="btn-${it.prepared?"ghost":"forest"}" style="margin-top:10px;font-size:12.5px;padding:8px 12px;min-height:36px;width:auto;" data-action="markItemDone" data-oid="${esc(o.id)}" data-iid="${esc(it.itemId)}" data-field="prepared">${it.prepared?"✓ 준비완료됨 (해제)":"📦 준비완료"}</button>
    </div>`;
  }).join("");
}

      <div class="field"><div class="field-head"><label class="field-label">방문 날짜</label></div>
        ${dates.length?`<select class="input" data-bind="eoiVisitDate"><option value="">날짜 선택</option>${dates.map(d=>`<option value="${d}" ${m.visitDate===d?"selected":""}>${d}</option>`).join("")}</select>`
          :`<input class="input" type="date" data-bind="eoiVisitDate" value="${esc(m.visitDate||"")}" />`}</div>
      <div class="field"><div class="field-head"><label class="field-label">방문 시간</label></div>
        ${dates.length?`<select class="input" data-bind="eoiVisitTime" ${!m.visitDate?"disabled":""}><option value="">시간</option>${slots.map(s=>`<option value="${s}" ${m.visitTime===s?"selected":""}>${s}</option>`).join("")}</select>`
          :`<input class="input" type="time" data-bind="eoiVisitTime" value="${esc(m.visitTime||"")}" />`}</div>`:""}
    ${m.deliveryMethod==="church"?`
      <div class="field"><div class="field-head"><label class="field-label">받으실 곳</label></div><input class="input" data-bind="eoiAddress" value="${esc(m.address||"")}" placeholder="예: ○○교회 본당 앞" /></div>
      <div class="field"><div class="field-head"><label class="field-label">수령 날짜</label></div><input class="input" type="date" data-bind="eoiChurchDate" value="${esc(m.churchDate||"")}" /></div>`:""}

    <div class="summary-box" style="margin-bottom:14px;">
      <div class="summary-row"><span>과일 금액</span><span class="tabular">${won(amount)}</span></div>
      <div class="summary-row" style="color:var(--inkSoft);"><span>택배비</span><span class="tabular">${m.deliveryMethod==="delivery"?won(shipping):"해당 없음"}</span></div>
      <div class="summary-row summary-total"><span>합계</span><span class="tabular">${won(amount+shipping)}</span></div>
    </div>

    <button class="btn-primary" data-action="saveEditOrderItem">저장</button>
    <button class="btn-ghost" style="width:100%;margin-top:10px;" data-action="closeEditOrderItem">취소</button>
  </div></div>`;
}

/* ---------------- Events ---------------- */
function bindEvents(){
  document.querySelectorAll("[data-bind]").forEach(el=>el.addEventListener("input", onBind));
  document.querySelectorAll("button[data-action],div[data-action]").forEach(el=>el.addEventListener("click", onAction));
  document.querySelectorAll("input[data-imgfor]").forEach(el=>el.addEventListener("change", onImagePicked));
  document.querySelectorAll("select[data-bind]").forEach(el=>el.addEventListener("change", onBind));
  const pinEl=document.getElementById("pinInput");
  if(pinEl) pinEl.addEventListener("keydown", e=>{ if(e.key==="Enter") checkPin(); });
}

function onBind(e){
  const key=e.target.getAttribute("data-bind");
  const val=e.target.type==="checkbox"?e.target.checked:e.target.value;
  const itemKeys={itemQty:"qty",itemAddress:"address",itemVisitDate:"visitDate",itemVisitTime:"visitTime",itemVisitPhone:"visitPhone",itemChurchDate:"churchDate",itemIsGift:"isGift",itemReceiverName:"receiverName",itemReceiverPhone:"receiverPhone",itemGiftArrival:"giftArrivalDate"};
  if(itemKeys[key]){
    const k=itemKeys[key];
    STATE.item[k] = k==="qty"?Math.max(1,parseInt(val)||1):val;
    // 방문 날짜가 바뀌면 시간 초기화
    if(k==="visitDate") STATE.item.visitTime="";
    if(["qty","isGift","visitDate","deliveryMethod"].includes(k) || e.target.tagName==="SELECT") render();
    return;
  }
  if(key==="idName"){ STATE.identify.name=val; return; }
  if(key==="idPhone"){ STATE.identify.phone=val; return; }
  if(key==="businessName"){ STATE.businessName=val; return; }
  if(key==="fruitFormName") STATE.fruitForm.name=val;
  if(key==="fruitFormPrice") STATE.fruitForm.price=val;
  if(key==="fruitFormStock") STATE.fruitForm.stock=val;
  if(key==="availDate") STATE.availForm.date=val;
  if(key==="availStart") STATE.availForm.start=val;
  if(key==="availEnd") STATE.availForm.end=val;
  if(key==="editFruitName") STATE.editFruit.name=val;
  if(key==="editFruitPrice") STATE.editFruit.price=val;
  if(key==="editFruitStock") STATE.editFruit.stock=val===""?null:val;
  if(STATE.editOrderItem){
    const m=STATE.editOrderItem;
    if(key==="eoiFruit"){ m.fruitId=val; render(); return; }
    if(key==="eoiQty"){ m.qty=Math.max(1,parseInt(val)||1); render(); return; }
    if(key==="eoiMethod"){ m.deliveryMethod=val; if(val!=="pickup"){/*keep*/} render(); return; }
    if(key==="eoiGiftArrival"){ m.giftArrivalDate=val; return; }
    if(key==="eoiVisitDate"){ m.visitDate=val; m.visitTime=""; render(); return; }
    if(key==="eoiVisitTime"){ m.visitTime=val; return; }
    if(key==="eoiChurchDate"){ m.churchDate=val; return; }
    if(key==="eoiAddress"){ m.address=val; return; }
  }
  if(["acctBank","acctNumber","acctHolder","acctPhone"].includes(key)){
    if(!STATE.accountForm) STATE.accountForm={...STATE.account};
    const m={acctBank:"bank",acctNumber:"number",acctHolder:"holder",acctPhone:"phone"};
    STATE.accountForm[m[key]]=val;
  }
}

async function onAction(e){
  // 모달 바깥 클릭으로 닫힘 방지: modal 내부 클릭은 무시
  if(e.currentTarget.getAttribute("data-stop")) { e.stopPropagation(); return; }
  const el=e.currentTarget, action=el.getAttribute("data-action"), id=el.getAttribute("data-id"), v=el.getAttribute("data-v");

  if(action==="setView"){ setState({view:v}); loadAll(true); return; }
  if(action==="startNew"){ setState({identifyMode:"new",identify:{name:"",phone:"",error:""},orderStep:"identify"}); return; }
  if(action==="startEdit"){ setState({identifyMode:"edit",identify:{name:"",phone:"",error:""},orderStep:"identify"}); return; }
  if(action==="backToLanding"){ setState({orderStep:"landing",cart:[],item:EMPTY_ITEM(),editingItemId:null,editingOrderId:null,editingCreatedAt:null,myOrders:[]}); return; }
  if(action==="identifyNext"){ identifyNext(); return; }
  if(action==="lookupOrders"){ await lookupOrders(); return; }
  if(action==="editOrder"){ startEditOrder(id); return; }
  if(action==="requestCancel"){ await requestCancel(id); return; }
  if(action==="cancelOrderEdit"){ setState({orderStep:"editList",cart:[],item:EMPTY_ITEM(),editingItemId:null,editingOrderId:null,editingCreatedAt:null}); return; }

  if(action==="pickFruit"){ setItem({fruitId:id}); return; }
  if(action==="itemQtyMinus"){ setItem({qty:Math.max(1,STATE.item.qty-1)}); return; }
  if(action==="itemQtyPlus"){ setItem({qty:STATE.item.qty+1}); return; }
  if(action==="itemDelivery"){ STATE.item.deliveryMethod=v; if(v!=="pickup"){STATE.item.visitDate="";STATE.item.visitTime="";} render(); return; }
  if(action==="addToCart"){ addToCart(); return; }
  if(action==="editCartItem"){ editCartItem(id); return; }
  if(action==="removeCartItem"){ STATE.cart=STATE.cart.filter(c=>c._id!==id); render(); return; }
  if(action==="cancelCartEdit"){ STATE.item=EMPTY_ITEM(); STATE.editingItemId=null; render(); return; }
  if(action==="copyAccount"){ navigator.clipboard?.writeText(STATE.account.number); STATE.copied=true; render(); setTimeout(()=>{STATE.copied=false;render();},1500); return; }
  if(action==="submitOrder"){ await submitOrder(); return; }

  if(action==="checkPin"){ checkPin(); return; }
  if(action==="setAdminTab"){ setState({adminTab:v}); if(v==="orders"||v==="work") loadAll(true); return; }
  if(action==="setWorkSub"){ setState({workSub:v}); return; }
  if(action==="markItemDone"){ await markItemDone(el.getAttribute("data-oid"), el.getAttribute("data-iid"), el.getAttribute("data-field")); return; }
  if(action==="openEditOrderItem"){ openEditOrderItem(el.getAttribute("data-oid"), el.getAttribute("data-iid")); return; }
  if(action==="closeEditOrderItem"){ STATE.editOrderItem=null; render(); return; }
  if(action==="saveEditOrderItem"){ await saveEditOrderItem(); return; }
  if(action==="addFruit"){ await addFruit(); return; }
  if(action==="clearNewFruitImage"){ STATE.fruitForm.image=""; render(); return; }
  if(action==="toggleFruit"){ await toggleFruit(id); return; }
  if(action==="deleteFruit"){ await deleteFruit(id); return; }
  if(action==="openEditFruit"){ const f=fruitById(id); if(f){STATE.editFruit={id:f.id,name:f.name,price:f.price,stock:f.stock,image:f.image||""};render();} return; }
  if(action==="closeEditFruit"){ STATE.editFruit=null; render(); return; }
  if(action==="saveEditFruit"){ await saveEditFruit(); return; }
  if(action==="saveBusinessName"){ await saveBusinessName(); return; }
  if(action==="saveAccount"){ await saveAccount(); return; }
  if(action==="addAvail"){ await addAvail(); return; }
  if(action==="deleteAvail"){ await deleteAvail(id); return; }
  if(action==="refreshOrders"){ await loadAll(); return; }
  if(action==="deleteOrder"){ await deleteOrder(id); return; }
  if(action==="confirmOrder"){ await confirmOrder(id); return; }
  if(action==="smsOrder"){ smsOrder(id); return; }
  if(action==="resendSms"){ smsOrder(id, true); return; }
}

function checkPin(){
  const pinEl=document.getElementById("pinInput");
  const val=pinEl?pinEl.value:STATE.pinInput;
  if(val===CONFIG.ADMIN_PIN) setState({adminUnlocked:true,pinError:false,pinInput:val});
  else setState({pinError:true,pinInput:val});
}

/* ---- image ---- */
function compressImage(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{const img=new Image();img.onload=()=>{let{width,height}=img;if(width>height&&width>maxDim){height=Math.round(height*maxDim/width);width=maxDim;}else if(height>maxDim){width=Math.round(width*maxDim/height);height=maxDim;}const c=document.createElement("canvas");c.width=width;c.height=height;c.getContext("2d").drawImage(img,0,0,width,height);resolve(c.toDataURL("image/jpeg",quality));};img.onerror=reject;img.src=reader.result;};
    reader.onerror=reject;reader.readAsDataURL(file);
  });
}
async function onImagePicked(e){
  const target=e.currentTarget.getAttribute("data-imgfor");
  const file=e.currentTarget.files&&e.currentTarget.files[0];
  if(!file) return;
  try{
    const dataUrl=await compressImage(file,600,0.7);
    if(target==="new"){ STATE.fruitForm.image=dataUrl; render(); }
    else if(target==="edit"){ STATE.editFruit.image=dataUrl; render(); }
    else{ const fr=fruitById(target); if(fr)fr.image=dataUrl; render(); await apiPost({action:"updateFruit",id:target,patch:{image:dataUrl}}); }
  }catch(err){ setState({saveError:"사진 처리에 실패했어요. 다른 사진으로 시도해주세요."}); }
}

/* ---- identify / lookup ---- */
function identifyNext(){
  const idn=STATE.identify;
  if(!idn.name.trim()||!digits(idn.phone)){ STATE.identify.error="이름과 연락처를 모두 입력해주세요."; render(); return; }
  setState({buyer:{name:idn.name.trim(),phone:idn.phone.trim()},cart:[],item:EMPTY_ITEM(),editingItemId:null,editingOrderId:null,editingCreatedAt:null,orderStep:"build",identify:{...idn,error:""}});
}
async function lookupOrders(){
  const idn=STATE.identify;
  if(!idn.name.trim()||!digits(idn.phone)){ STATE.identify.error="이름과 연락처를 모두 입력해주세요."; render(); return; }
  await loadAll(true);
  const mine=STATE.orders.filter(o=>String(o.name).trim()===idn.name.trim() && phoneKey(o.phone)===phoneKey(idn.phone));
  if(!mine.length){ STATE.identify.error="입력하신 정보로 등록된 주문을 찾지 못했어요. 이름/연락처를 다시 확인해주세요."; render(); return; }
  setState({myOrders:mine,orderStep:"editList",identify:{...idn,error:""}});
}
function startEditOrder(id){
  const o=STATE.orders.find(x=>x.id===id); if(!o) return;
  const cart=(o.items||[]).map(it=>({ _id:uid(), fruitId:it.fruitId, qty:it.qty, deliveryMethod:it.deliveryMethod||"delivery", address:it.address||"", visitDate:it.visitDate||"", visitTime:it.visitTime||"", visitPhone:it.visitPhone||"", churchDate:it.churchDate||"", isGift:!!it.isGift, receiverName:it.receiverName||"", receiverPhone:it.receiverPhone||"", giftArrivalDate:it.giftArrivalDate||"" }));
  setState({buyer:{name:o.name,phone:o.phone},cart,item:EMPTY_ITEM(),editingItemId:null,editingOrderId:o.id,editingCreatedAt:o.createdAt,orderStep:"build"});
}

async function requestCancel(id){
  if(!confirm("정말 취소하시겠습니까?")) return;
  const o=STATE.orders.find(x=>x.id===id); if(!o) return;
  const mine=STATE.myOrders.find(x=>x.id===id);
  o.cancelRequested=true; if(mine) mine.cancelRequested=true;
  render(); // 낙관적
  try{
    await apiPost({action:"requestCancel", id});
  }catch(e){
    o.cancelRequested=false; if(mine) mine.cancelRequested=false;
    setState({saveError:"취소 요청에 실패했어요. 다시 시도해주세요."});
  }
}

/* ---- cart ---- */
function validateItem(){
  const it=STATE.item, e={};
  if(!it.fruitId) e.fruitId="과일을 선택해주세요.";
  if(it.deliveryMethod==="pickup"){
    if(!it.visitDate) e.visitDate="방문 날짜를 선택해주세요.";
    if(!it.visitTime) e.visitTime="방문 시간을 선택해주세요.";
    if(!digits(it.visitPhone)) e.visitPhone="방문자 연락처를 입력해주세요.";
  }
  if(it.deliveryMethod==="church"){
    if(!it.address.trim()) e.address="받으실 곳을 입력해주세요.";
    if(!it.churchDate) e.churchDate="수령 날짜를 선택해주세요.";
  }
  if(it.isGift && !it.receiverName.trim()) e.receiverName="받는 분 성함을 입력해주세요.";
  STATE.item.errors=e;
  return Object.keys(e).length===0;
}
function addToCart(){
  if(!validateItem()){ render(); return; }
  const it=STATE.item;
  const entry={ _id:STATE.editingItemId||uid(), fruitId:it.fruitId, qty:it.qty, deliveryMethod:it.deliveryMethod,
    address:(it.deliveryMethod==="delivery"||it.deliveryMethod==="church")?it.address.trim():"",
    visitDate:it.deliveryMethod==="pickup"?it.visitDate:"", visitTime:it.deliveryMethod==="pickup"?it.visitTime:"", visitPhone:it.deliveryMethod==="pickup"?it.visitPhone.trim():"",
    churchDate:it.deliveryMethod==="church"?it.churchDate:"",
    isGift:it.isGift, receiverName:it.isGift?it.receiverName.trim():"", receiverPhone:it.isGift?it.receiverPhone.trim():"",
    giftArrivalDate:it.deliveryMethod==="delivery"?it.giftArrivalDate:"" };
  if(STATE.editingItemId){ STATE.cart=STATE.cart.map(c=>c._id===STATE.editingItemId?entry:c); }
  else STATE.cart=[...STATE.cart,entry];
  STATE.item=EMPTY_ITEM(); STATE.editingItemId=null; render();
}
function editCartItem(id){
  const ci=STATE.cart.find(c=>c._id===id); if(!ci) return;
  STATE.item={...EMPTY_ITEM(),...ci,errors:{}}; STATE.editingItemId=id; render();
}

/* ---- submit ---- */
async function submitOrder(){
  if(!STATE.cart.length) return;
  STATE.submitting=true; render();
  const editing=!!STATE.editingOrderId;
  const items=STATE.cart.map((ci,idx)=>{
    const f=fruitById(ci.fruitId);
    const amount=itemAmount(ci), shippingFee=itemShipping(ci);
    const oid = editing?STATE.editingOrderId:null;
    return { itemId: ci._id || ((oid||"new")+"-"+idx+"-"+Math.random().toString(36).slice(2,6)),
      fruitId:ci.fruitId, fruitName:f?f.name:"", qty:ci.qty, unitPrice:f?f.price:0, amount, shippingFee, totalAmount:amount+shippingFee,
      deliveryMethod:ci.deliveryMethod, address:ci.address, visitDate:ci.visitDate, visitTime:ci.visitTime, visitPhone:ci.visitPhone, churchDate:ci.churchDate,
      isGift:ci.isGift, receiverName:ci.receiverName, receiverPhone:ci.receiverPhone, giftArrivalDate:ci.giftArrivalDate,
      delivered:false, prepared:false };
  });
  const order={ id:editing?STATE.editingOrderId:uid(), name:STATE.buyer.name, phone:STATE.buyer.phone, items,
    createdAt:editing?STATE.editingCreatedAt:new Date().toISOString(), modified:editing, modifiedAt:editing?new Date().toISOString():"" };
  try{
    await apiPost({action:editing?"updateOrder":"addOrder", order});
    STATE._doneTotal=cartTotal();
    setState({submitting:false,orderStep:"done",doneMode:editing?"edit":"new",cart:[],item:EMPTY_ITEM(),editingOrderId:null,editingCreatedAt:null});
    loadAll(true);
  }catch(e){ setState({submitting:false,saveError:"주문 저장에 실패했어요. 잠시 후 다시 시도해주세요."}); }
}

/* ---- admin actions ---- */
async function addFruit(){
  const ff=STATE.fruitForm;
  if(!ff.name.trim()||!ff.price) return;
  const nf={id:uid(),name:ff.name.trim(),price:parseInt(ff.price)||0,stock:ff.stock===""?null:parseInt(ff.stock)||0,active:true,image:ff.image||""};
  try{ await apiPost({action:"addFruit",...nf}); STATE.fruitForm={name:"",price:"",stock:"",image:""}; STATE.fruits=[...STATE.fruits,nf]; render(); }
  catch(e){ setState({saveError:"저장에 실패했어요."}); }
}
async function toggleFruit(id){
  const fr=fruitById(id); if(!fr) return;
  try{ await apiPost({action:"updateFruit",id,patch:{active:!fr.active}}); fr.active=!fr.active; render(); }
  catch(e){ setState({saveError:"저장에 실패했어요."}); }
}
async function deleteFruit(id){
  try{ await apiPost({action:"deleteFruit",id}); STATE.fruits=STATE.fruits.filter(f=>f.id!==id); render(); }
  catch(e){ setState({saveError:"삭제에 실패했어요."}); }
}
async function saveEditFruit(){
  const ef=STATE.editFruit; if(!ef) return;
  const patch={name:ef.name.trim(),price:parseInt(ef.price)||0,stock:ef.stock===null||ef.stock===""?null:parseInt(ef.stock)||0,image:ef.image||""};
  const fr=fruitById(ef.id); if(fr) Object.assign(fr,patch);
  STATE.editFruit=null; render();
  try{ await apiPost({action:"updateFruit",id:ef.id,patch}); }
  catch(e){ setState({saveError:"저장에 실패했어요."}); }
}
async function saveBusinessName(){
  try{ await apiPost({action:"setBusinessName",businessName:STATE.businessName}); }
  catch(e){ setState({saveError:"저장에 실패했어요."}); }
}
async function saveAccount(){
  const a=STATE.accountForm||STATE.account;
  try{ await apiPost({action:"setAccount",...a}); STATE.account={...a}; STATE.accountForm=null; render(); }
  catch(e){ setState({saveError:"저장에 실패했어요."}); }
}
async function addAvail(){
  const af=STATE.availForm;
  if(!af.date||!af.start||!af.end) return;
  if(af.end<=af.start){ setState({saveError:"종료 시간이 시작 시간보다 늦어야 해요."}); return; }
  const entry={id:uid(),date:af.date,start:af.start,end:af.end};
  try{ await apiPost({action:"addAvail",...entry}); STATE.availability=[...STATE.availability,entry]; STATE.availForm={date:"",start:"09:00",end:"18:00"}; render(); }
  catch(e){ setState({saveError:"저장에 실패했어요."}); }
}
async function deleteAvail(id){
  try{ await apiPost({action:"deleteAvail",id}); STATE.availability=STATE.availability.filter(a=>a.id!==id); render(); }
  catch(e){ setState({saveError:"삭제에 실패했어요."}); }
}
async function deleteOrder(id){
  if(!confirm("DB에서 자료가 삭제됩니다. 정말 취소하시겠습니까?")) return;
  const backup=STATE.orders;
  STATE.orders=STATE.orders.filter(o=>o.id!==id); render();
  try{ await apiPost({action:"deleteOrder",id}); }
  catch(e){ STATE.orders=backup; setState({saveError:"주문 취소에 실패했어요. 다시 시도해주세요."}); }
}
async function confirmOrder(id){
  const o=STATE.orders.find(x=>x.id===id);
  if(o) o.modified=false; render(); // 낙관적 업데이트
  try{ await apiPost({action:"confirmOrder",id}); }
  catch(e){ if(o) o.modified=true; setState({saveError:"처리에 실패했어요."}); }
}

async function markItemDone(orderId, itemId, field){
  const o=STATE.orders.find(x=>x.id===orderId);
  if(!o) return;
  const it=(o.items||[]).find(x=>x.itemId===itemId);
  if(!it) return;
  const prev=!!it[field];
  it[field]=!prev; // 낙관적: 화면 먼저 반영
  render();
  try{
    await apiPost({action:"setItemFlag", orderId, itemId, field, value:it[field], items:o.items});
  }catch(e){
    it[field]=prev; // 실패 시 롤백
    setState({saveError:"저장에 실패했어요. 다시 시도해주세요."});
  }
}

function openEditOrderItem(orderId, itemId){
  const o=STATE.orders.find(x=>x.id===orderId);
  if(!o) return;
  const it=(o.items||[]).find(x=>x.itemId===itemId);
  if(!it) return;
  STATE.editOrderItem={
    orderId, itemId,
    fruitId:it.fruitId, qty:it.qty, deliveryMethod:it.deliveryMethod, address:it.address||"",
    giftArrivalDate:it.giftArrivalDate||"", visitDate:it.visitDate||"", visitTime:it.visitTime||"", churchDate:it.churchDate||"",
  };
  render();
}

async function saveEditOrderItem(){
  const m=STATE.editOrderItem; if(!m) return;
  const o=STATE.orders.find(x=>x.id===m.orderId); if(!o) return;
  const it=(o.items||[]).find(x=>x.itemId===m.itemId); if(!it) return;

  // 최초 주문값 스냅샷 (최초 1회만 고정)
  if(it.origQty===undefined){
    it.origQty=it.qty;
    it.origTotalAmount=it.totalAmount??0;
    it.origSched=schedDate(it.deliveryMethod,o,it)||"";
    it.origFruitName=it.fruitName;
    it.origMethod=it.deliveryMethod;
  }

  const f=fruitById(m.fruitId);
  const qty=Math.max(1,parseInt(m.qty)||1);
  const price=f?f.price:(it.unitPrice||0);
  const amount=price*qty;
  const shippingFee=m.deliveryMethod==="delivery"?(qty>=CONFIG.FREE_SHIPPING_BOX_COUNT?0:CONFIG.SHIPPING_FEE):0;

  const backup={...it}; // 롤백용
  Object.assign(it,{
    fruitId:m.fruitId, fruitName:f?f.name:it.fruitName, unitPrice:price,
    qty, amount, shippingFee, totalAmount:amount+shippingFee,
    deliveryMethod:m.deliveryMethod,
    address:(m.deliveryMethod==="delivery"||m.deliveryMethod==="church")?(m.address||""):"",
    giftArrivalDate:m.deliveryMethod==="delivery"?(m.giftArrivalDate||""):"",
    visitDate:m.deliveryMethod==="pickup"?(m.visitDate||""):"",
    visitTime:m.deliveryMethod==="pickup"?(m.visitTime||""):"",
    visitPhone:m.deliveryMethod==="pickup"?(it.visitPhone||o.phone):"",
    churchDate:m.deliveryMethod==="church"?(m.churchDate||""):"",
    itemModifiedAt:new Date().toISOString(),
  });
  o.modified=true; o.modifiedAt=new Date().toISOString(); o.smsSent=false;
  STATE.editOrderItem=null;
  render(); // 낙관적 업데이트

  try{
    await apiPost({action:"updateOrder", order:{ id:o.id, name:o.name, phone:o.phone, items:o.items, modified:true, modifiedAt:o.modifiedAt }});
  }catch(e){
    Object.assign(it,backup); o.modified=false;
    setState({saveError:"저장에 실패했어요. 다시 시도해주세요."});
  }
}

function buildOrderSms(o){
  const shop = STATE.businessName || "과수원";
  const a = STATE.account || {};
  const lines = [];
  lines.push(`[${shop} 주문확인]`);
  lines.push(`${o.name}님`);
  let total = 0;
  let anyChanged = false;
  (o.items||[]).forEach(it=>{
    total += (it.totalAmount||0);
    const method = it.deliveryMethod==="pickup" ? `방문수령 ${it.visitDate||""} ${it.visitTime||""}`.trim()
      : it.deliveryMethod==="church" ? `직접전달 ${it.address||""} ${it.churchDate||""}`.trim()
      : `택배${it.giftArrivalDate?" "+it.giftArrivalDate+" 도착":""}`;
    let line = `· ${it.fruitName} ${it.qty}개 (${method}`;
    if(it.isGift){ line += `/선물 받는분:${it.receiverName||""}`; }
    line += `) ${won(it.totalAmount||0)}`;
    lines.push(line);
    // 관리자가 수정한 품목이면 최초 주문값 병기
    if(it.itemModifiedAt && it.origQty!==undefined){
      anyChanged = true;
      const nowSched = it.deliveryMethod==="pickup"?`${it.visitDate||""} ${it.visitTime||""}`.trim()
        : it.deliveryMethod==="church"?(it.churchDate||"") : (it.giftArrivalDate||"");
      let chg = `   (변경: 수량 ${it.origQty}→${it.qty}, 금액 ${won(it.origTotalAmount)}→${won(it.totalAmount||0)}`;
      if((it.origSched||"")!==(nowSched||"")) chg += `, 일정 ${it.origSched||"-"}→${nowSched||"-"}`;
      chg += ")";
      lines.push(chg);
    }
  });
  lines.push(`합계: ${won(total)}`);
  lines.push("");
  if(anyChanged) lines.push("※ 작황·일정 사정으로 위와 같이 조정되었습니다. 확인 부탁드립니다.");
  lines.push("");
  lines.push("안녕하세요? 에덴농원지기입니다.");
  lines.push("저희 과일을 주문해 주셔서 진심으로 감사합니다. 최대한 선별하여 보냈지만 혹시나 과일에 문제가 있다면 언제든 연락 주세요.");
  lines.push("*연락처: 010 7375 7075");
  lines.push("*계좌번호: 농협 352 1173 6743 73 입니다.");
  lines.push("오늘도 행복한 하루 되세요!");
  return lines.join("\n");
}

function smsOrder(id, isResend){
  const o = STATE.orders.find(x=>x.id===id);
  if(!o) return;
  const body = buildOrderSms(o);
  const phone = digits(o.phone);
  const href = `sms:${phone}?body=${encodeURIComponent(body)}`;
  // 전송 완료 표시 저장 (다시 보내기는 재저장 불필요)
  if(!o.smsSent){
    o.smsSent = true;
    render();
    apiPost({action:"markSmsSent", id}).catch(()=>{});
  }
  window.location.href = href;
}
</script>
